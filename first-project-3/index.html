<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
		<link rel="stylesheet" href="./css/style.css" />
	</head>
	<body>
		<form class="form">
			<fieldset>
				<legend>Ваши личные данные</legend>
				<label class="name">
					<span>Ваше имя</span>
					<input type="name" required placeholder="Имя" />
				</label>
				<label>
					<span>Ваш возраст</span>
					<input
						type="number"
						inputmode="numeric"
						required
						placeholder="Возраст"
					/>
				</label>
				<label>
					<span>Ваш номер телефона</span>
					<input
						type="tel"
						inputmode="tel"
						required
						placeholder="Номер телефона"
					/>
				</label>
				<label>
					<span>Ваша почта</span>
					<input type="email" required inputmode="email" placeholder="Почта" />
				</label>
				<label>
					<span>Сообшение</span>
					<textarea name="mesag" placeholder="Ваше сообщение"></textarea>
				</label>
				<label class="coment">
					<input
						class="flex"
						type="checkbox"
						name="conset"
						value="conset"
						required
					/>
					Я принима правила
				</label>
				<button type="submit">Отправить</button>
			</fieldset>
		</form>
	</body>
</html>
